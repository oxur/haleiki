		<text class="t" systemLanguage="de">(DE) Eindeutig gefährdet</text>
		<text class="t" systemLanguage="el">(DE) Σε βέβαιο κίνδυνο</text>
		<text class="t" systemLanguage="es">(DE) Definitivamente en peligro</text>
		<text class="t" systemLanguage="fr">(DE) Définitivement en danger</text>
		<text class="t" systemLanguage="it">(DE) Decisamente in pericolo</text>
		<text class="t" systemLanguage="mk">(DE) Дефинитивно загрозен</text>
		<text class="t" systemLanguage="prg">(DE) Eīsku entrintinis</text>
		<text class="t" systemLanguage="br">(DE) En arvar da vat</text>
