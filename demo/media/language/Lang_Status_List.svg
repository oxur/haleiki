<?xml version="1.0" encoding="UTF-8"?>
<!--*-indent-tabs-mode:t;tab-width:4;-*- vim:se noet ts=4:-->
<svg version="1.1" viewBox="0 0 1740 810" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="default">
<title lang="en">UNESCO language endangerment classification</title>
<defs>
	<style type="text/css">
		circle, line, path{
			fill: none;
			stroke: currentColor;
			stroke-width: 2;
		}
		polygon, rect{
			fill: currentColor;
			stroke: none;
		}
		text, .l, .r, .t{
			fill: currentColor;
			font-family: Arial, Helvetica, sans-serif;
			font-size: 80px;
		}
		.l, .r  { text-anchor: middle; }
		.l      { font-size: 57px; }
		.r      { font-size: 51px; }
		.name   { font-weight: bold; color: #000; }
		.invert { color: #fff !important; }

		.arrow{
			stroke-width: 6;
			marker-end: url(#arrowhead);
		}

		#bracket{
			stroke-width: 3;
			stroke-linecap: round;
			stroke-linejoin: round;
		}

		/* Category colours */
		#cr { color: #ff4050; }
		#de { color: #f2f261; }
		#ex { color: #000; }
		#ne { color: #e5e5e5; }
		#se { color: #e80; }
		#vu { color: #97c135; }
	</style>

	<!-- Arrowhead -->
	<marker id="arrowhead" viewBox="0 0 34 34" refX="17" refY="17" markerWidth="34" markerHeight="34" markerUnits="userSpaceOnUse" orient="auto"><polygon points="   14.3 16.8   0    0   34   17.2   0    34  "/></marker>

	<!-- Circled symbols -->
	<g id="circled-plus">
		<circle cx="13.5" cy="13.5" r="12.5"/>
		<line x1="13.5" y1="1.3" x2="13.5" y2="25.6"/>
		<line x1="1.2" y1="13.5" x2="25.7" y2="13.5"/>
	</g>
	<g id="circled-minus">
		<circle cx="13.5" cy="13.5" r="12.5"/>
		<line x1="1.2" y1="13.5" x2="25.7" y2="13.5"/>
	</g>
</defs>
<g id="left-margin">
	<switch transform="translate(63.5 380) rotate(-90) scale(0.85 1)">
		<text class="l" systemLanguage="de">Gefährdet</text>
		<text class="l" systemLanguage="el">Κινδυνεύοντα</text>
		<text class="l" systemLanguage="es">En peligro</text>
		<text class="l" systemLanguage="fr">En danger</text>
		<text class="l" systemLanguage="it">In pericolo</text>
		<text class="l" systemLanguage="mk">Загрозен</text>
		<text class="l" systemLanguage="prg">Entrintinis</text>
		<text class="l" systemLanguage="br">En arvar</text>
		<text class="l" systemLanguage="id">Terancam</text>
		<text class="l" systemLanguage="ms">Terancam</text>
		<text class="l">Endangered</text>
	</switch>
	<path id="bracket" d="   M 178.7 645.8   c -14.6 0 -28.3 -17.6 -28.3 -42   V 438.2   c 0 -19.6 -6.6 -45.9 -28 -47.4   c 21.4 -1.5 28 -27.9 28 -47.4   V 177.8   c 0 -24.4 13.8 -42 28.3 -42  "/>
</g>
<g id="right-margin">
	<switch transform="translate(1718 445) rotate(-90) scale(0.9 1)">
		<text class="r" systemLanguage="de">Gefährdungsstufe</text>
		<text class="r" systemLanguage="el">Επίπεδο κινδύνου</text>
		<text class="r" systemLanguage="es">Grado de peligro</text>
		<text class="r" systemLanguage="fr">Niveau de danger</text>
		<text class="r" systemLanguage="it">Livello di pericolo</text>
		<text class="r" systemLanguage="mk">Степен на загрозеност</text>
		<text class="r" systemLanguage="prg">Entrintines mats</text>
		<text class="r" systemLanguage="br">Derez arvarusted</text>
		<text class="r" systemLanguage="id">Tingkat bahaya</text>
		<text class="r" systemLanguage="ms">Tahap bahaya</text>
		<text class="r">Degree of Endangerment</text>
	</switch>
	<line class="arrow" x2="1626" y2="148" x1="1626" y1="448"/>
	<line class="arrow" x1="1626" y1="448" x2="1626" y2="755"/>
	<use xlink:href="#circled-plus" x="1613" y="92"/>
	<use xlink:href="#circled-minus" x="1613" y="782"/>
</g>

<!-- Category list -->
