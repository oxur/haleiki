<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">

<svg x="0" y="0" width="160" height="135" version="1.1" 
	xmlns="http://www.w3.org/2000/svg"
	xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve">

<defs>
<g id="square">
	<rect x="-50" y="-50" width="100" height="100" fill="none" stroke="black" stroke-width="5"/>
	<circle cx="-50" cy="-50" r="10"  stroke="none" fill="rgb(0,146,70)"/>
	<circle cx="50" cy="-50" r="10"  stroke="none" fill="rgb(188,30,71)"/>
	<circle cx="-50" cy="50" r="10"  stroke="none" fill="rgb(254,194,0)"/>
	<circle cx="50" cy="50" r="10"  stroke="none" fill="rgb(0,129,205)"/>
        <g text-anchor="middle" stroke="black" stroke-width="1" fill="white" 
		font-family="helvetica; sans-serif" font-size="18" font-weight="bold"
		transform="translate(0,7)">
		<text x="-50" y="-50" >1</text>                                                                                       
        <text x="50" y="-50">2</text>                                                                                        
        <text x="50" y="50">3</text>                                                                                         
        <text x="-50" y="50">4</text>
	</g>
</g>
<marker id="arrow" viewBox="0 0 10 10" refX="4" refY="5" 
    markerUnits="strokeWidth" orient="auto"
    markerWidth="5" markerHeight="5">
    <polyline points="0,0 10,5 0,10 4,5" fill="gray" />
</marker>
</defs>

<g transform="translate(60,60)">
<g stroke="lightgray" stroke-width="3" opacity=".3" fill="none">
	<path d="M-50,-50 l50,50 l-50,50"/>
	<path d="M-20,-20 a 28,28 0,1,1 0,40"/>
	<path d="M28,-4 l0,1 l0,1" marker-mid="url(#arrow)" style="fill: none" />
	<use xlink:href="#square"/>
</g>
<use xlink:href="#square" transform="translate(40,15)rotate(-90,0,0)"/>
</g>
</svg>
