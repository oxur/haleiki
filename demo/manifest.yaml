# Haleiki Demo Site — Content Manifest
# Content sourced under CC BY-SA (3.0/4.0) from Wikimedia projects and Rigpa Wiki.

# Default settings (can be overridden per-article)
defaults:
  project: "en.wikipedia.org"
  license: "CC BY-SA 4.0"
  media:
    max_width: 1024
    formats:
      - "svg"
      - "png"
      - "jpg"
    skip_patterns:
      - "Flag_of_*"
      - "Wiki-*.svg"
      - "Commons-logo*"
      - "Ambox_*"

# Classification defaults for the demo taxonomy
taxonomy:
  categories:
    - "tibetan-buddhism"
    - "theoretical-physics"
    - "mathematics"
    - "music"
    - "programming-languages"
    - "artificial-intelligence"
    - "philosophy-of-mind"
    - "linguistics"
    - "botany"
    - "geology"
  tiers:
    - "foundational"
    - "intermediate"
    - "advanced"

