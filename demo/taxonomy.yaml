# Haleiki Demo Site — Taxonomy
#
# Categories and tiers used by the demo content cluster.
# These must match the values used in demo/manifest.yaml.

categories:
  - name: "tibetan-buddhism"
    description: "Tibetan Buddhist philosophy, practices, teachers, and lineages"
  - name: "theoretical-physics"
    description: "Fundamental physics, quantum mechanics, relativity, and unification theories"
  - name: "mathematics"
    description: "Pure mathematics: algebra, topology, category theory, and foundations"
  - name: "music"
    description: "Music theory, history, composers, and genres"
  - name: "programming-languages"
    description: "Programming language design, history, and notable figures"
  - name: "artificial-intelligence"
    description: "AI history, theory, systems, and key figures"
  - name: "philosophy-of-mind"
    description: "Consciousness, cognition, perception, and the mind-body problem"
  - name: "linguistics"
    description: "Languages, writing systems, scripts, and historical linguistics"
  - name: "botany"
    description: "Plants, fungi, lichens, and symbiotic relationships"
  - name: "geology"
    description: "Earth's structure, tectonics, and geophysics"

tiers:
  - name: "foundational"
    description: "Core concepts — prerequisites for most other topics"
    order: 1
  - name: "intermediate"
    description: "Builds on foundational knowledge"
    order: 2
  - name: "advanced"
    description: "Specialized or research-level topics"
    order: 3
